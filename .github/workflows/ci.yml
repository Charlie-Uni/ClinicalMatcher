name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python scripts/check_public_data.py
      - run: clinical-matcher-validate fixtures/synthetic/trial_matching.json
      - run: python -m unittest discover -s tests -v
      - run: clinical-matcher-smoke --fixture fixtures/synthetic/trial_matching.json
      - run: >-
          clinical-matcher-split
          --fixture fixtures/synthetic/trial_matching.json
          --strategy patient_holdout
          --seed 17
          --test-fraction 0.5
          --output /tmp/clinicalmatcher-split.json
      - run: >-
          clinical-matcher-check-split
          --manifest /tmp/clinicalmatcher-split.json
      - run: >-
          clinical-matcher-evaluate
          --fixture fixtures/synthetic/trial_matching.json
          --manifest /tmp/clinicalmatcher-split.json
          --split test
          --bootstrap-samples 100
          --output-dir /tmp/clinicalmatcher-report
