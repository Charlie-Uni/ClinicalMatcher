name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python scripts/check_public_data.py
      - run: clinical-matcher-validate fixtures/synthetic/trial_matching.json
      - run: python -m unittest discover -s tests -v
      - run: clinical-matcher-smoke --fixture fixtures/synthetic/trial_matching.json
      - run: >-
          clinical-matcher-split
          --fixture fixtures/synthetic/trial_matching.json
          --strategy patient_holdout
          --seed 17
          --test-fraction 0.5
          --output /tmp/clinicalmatcher-split.json
      - run: >-
          clinical-matcher-check-split
          --manifest /tmp/clinicalmatcher-split.json
      - run: >-
          clinical-matcher-audit-semantic-scan
          --manifest /tmp/clinicalmatcher-split.json
          --semantic-pairs fixtures/synthetic/semantic_pairs_none.json
          --dimension patient
          --embedding-model-id synthetic-encoder
          --embedding-model-revision synthetic-v1
          --pooling mean
          --vectors-normalized
          --search-method exhaustive_cosine
          --candidate-pairs-evaluated 1
          --output /tmp/clinicalmatcher-semantic-audit.json
      - run: >-
          clinical-matcher-import-trial
          --nct-id NCT99999999
          --study-json fixtures/synthetic/clinicaltrials_api_study.json
          --version-json fixtures/synthetic/clinicaltrials_api_version.json
          --output /tmp/clinicalmatcher-trial.json
      - run: >-
          clinical-matcher-pilot summarize
          --manifest fixtures/synthetic/pilot/manifest.json
          --annotation fixtures/synthetic/pilot/annotation-a.json
          --annotation fixtures/synthetic/pilot/annotation-b.json
          --adjudication fixtures/synthetic/pilot/adjudication.json
          --output /tmp/clinicalmatcher-pilot-summary.json
      - run: >-
          clinical-matcher-plan-capacity
          --pilot-summary /tmp/clinicalmatcher-pilot-summary.json
          --hours-per-annotator 10
          --maximum-trials 2
          --selected-trial-count 2
          --output /tmp/clinicalmatcher-capacity.json
      - run: >-
          clinical-matcher-snapshot build
          --disease-domain atrial_fibrillation
          --selection-rationale "Synthetic CI selection; not clinical data"
          --query-condition "Atrial Fibrillation"
          --study-type INTERVENTIONAL
          --overall-status RECRUITING
          --overall-status NOT_YET_RECRUITING
          --first-posted-from 2024-01-01
          --first-posted-to 2025-12-31
          --capacity-plan /tmp/clinicalmatcher-capacity.json
          --search-response-json
          fixtures/synthetic/clinicaltrials_api_search_response.json
          --version-json fixtures/synthetic/clinicaltrials_api_version.json
          --output-dir /tmp/clinicalmatcher-trial-snapshot
      - run: >-
          clinical-matcher-snapshot verify
          --snapshot-dir /tmp/clinicalmatcher-trial-snapshot
      - run: >-
          clinical-matcher-gold-readiness
          --snapshot-dir /tmp/clinicalmatcher-trial-snapshot
          --gold-source-description "No clinical gold in public CI"
          --output /tmp/clinicalmatcher-gold-readiness.json
      - run: >-
          clinical-matcher-evaluate
          --fixture fixtures/synthetic/trial_matching.json
          --manifest /tmp/clinicalmatcher-split.json
          --split test
          --bootstrap-samples 100
          --output-dir /tmp/clinicalmatcher-report
